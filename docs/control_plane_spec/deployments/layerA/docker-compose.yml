# SenseL Layer A — Data Plane (MVP)
# Copy this file to Control Plane repo: deployments/layerA/docker-compose.yml
# Usage: docker compose -f deployments/layerA/docker-compose.yml up -d

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sensel
      POSTGRES_PASSWORD: sensel
      POSTGRES_DB: sensel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensel"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    profiles:
      - full

  kafka:
    image: apache/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    volumes:
      - kafka_data:/var/lib/kafka/data
    profiles:
      - full

  console:
    image: apache/kafka:3.7
    command: >
      /opt/kafka/bin/kafka-console-consumer.sh
      --bootstrap-server kafka:9092
      --topic events.norm.default
      --from-beginning
    depends_on:
      - kafka
    profiles:
      - full

volumes:
  postgres_data:
  kafka_data:
