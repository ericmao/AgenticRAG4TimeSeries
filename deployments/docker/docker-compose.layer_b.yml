# Layer B inference: worker + optional API. CPU or GPU (nvidia runtime).
# Usage:
#   docker compose -f deployments/docker/docker-compose.layer_b.yml run --rm layer_b_worker
#   GPU: add deploy.resources.reservations.devices: [driver: nvidia, count: 1] and runtime: nvidia
services:
  layer_b_worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.layer_b
    env_file: ../../.env
    environment:
      - CONTROL_PLANE_BASE_URL=${CONTROL_PLANE_BASE_URL:-}
      - CONTROL_PLANE_TOKEN=${CONTROL_PLANE_TOKEN:-}
      - TENANT_ID=${TENANT_ID:-tenant-default}
      - GPU_MODE=${GPU_MODE:-off}
      - MODEL_DEVICE=${MODEL_DEVICE:-auto}
    volumes:
      - ../../jobs:/app/jobs
      - ../../outputs:/app/outputs
    working_dir: /app
    command: ["python", "scripts/run_layer_b_worker.py", "--jobs-dir", "/app/jobs"]

  # Optional: API for push mode (POST /inference/run)
  # layer_b_api:
  #   build: ...
  #   ports: ["8000:8000"]
  #   command: ["uvicorn", "services.layer_b_inference.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
