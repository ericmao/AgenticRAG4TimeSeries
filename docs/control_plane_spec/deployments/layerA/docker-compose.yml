# SenseL Layer A — Data Plane (MVP)
# Copy this file to Control Plane repo: deployments/layerA/docker-compose.yml
# Usage: docker compose -f deployments/layerA/docker-compose.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sensel
      POSTGRES_PASSWORD: sensel
      POSTGRES_DB: sensel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensel"]
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.8.0
    container_name: layera-emqx
    environment:
      EMQX_API_KEY__BOOTSTRAP_FILE: "/opt/emqx/etc/default_api_key.conf"
    ports:
      - "1883:1883"   # MQTT TCP
      - "8083:8083"   # MQTT over WebSocket
      - "18083:18083" # Dashboard / Management API（guacamole-ai DATAPLANE_EMQX_URL 用此埠）
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./emqx_default_api_key.conf:/opt/emqx/etc/default_api_key.conf:ro
    networks:
      sensel-dataplane:
        aliases:
          - emqx
    profiles:
      - full

  kafka:
    image: apache/kafka:3.9.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    profiles:
      - full

  console:
    image: apache/kafka:3.9.1
    command: >
      /opt/kafka/bin/kafka-console-consumer.sh
      --bootstrap-server kafka:19092
      --topic events.norm.default
      --from-beginning
    depends_on:
      - kafka
    profiles:
      - full

networks:
  sensel-dataplane:
    external: true

volumes:
  postgres_data:
  kafka_data:
  emqx_data:
  emqx_log:
